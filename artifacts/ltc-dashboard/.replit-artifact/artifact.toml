kind = "web"
previewPath = "/"
title = "LTC Population Health Dashboard"
version = "1.0.0"
id = "artifacts/ltc-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21020

[services.development]
run = "pnpm --filter @workspace/ltc-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ltc-dashboard", "run", "build" ]
publicDir = "artifacts/ltc-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21020"
BASE_PATH = "/"
