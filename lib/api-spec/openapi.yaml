openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: residents
  - name: bowelMovements
  - name: painEvents
  - name: behaviorEvents
  - name: intakeEvents
  - name: fallEvents
  - name: vitalEvents
  - name: physician
  - name: communicationBinder
  - name: faxDirectory
  - name: faxLogs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /residents:
    get:
      operationId: listResidents
      tags: [residents]
      summary: List all residents
      responses:
        "200":
          description: List of residents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resident"

  /fax-directory:
    get:
      operationId: listFaxDirectory
      tags: [faxDirectory]
      summary: List all fax directory entries
      responses:
        "200":
          description: List of fax directory entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaxDirectoryEntry"
    post:
      operationId: createFaxEntry
      tags: [faxDirectory]
      summary: Create a new fax directory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaxDirectoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaxDirectoryEntry"

  /fax-directory/{entryId}:
    patch:
      operationId: updateFaxEntry
      tags: [faxDirectory]
      summary: Update a fax directory entry
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaxDirectoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaxDirectoryEntry"
    delete:
      operationId: deleteFaxEntry
      tags: [faxDirectory]
      summary: Delete a fax directory entry
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /fax:
    post:
      operationId: sendFax
      tags: [faxLogs]
      summary: Send a fax (mock)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaxInput"
      responses:
        "201":
          description: Fax log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaxLog"

  /residents/{residentId}/fax-history:
    get:
      operationId: listFaxHistory
      tags: [faxLogs]
      summary: List fax history for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of fax logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaxLog"

  /residents/{residentId}/favorite:
    patch:
      operationId: toggleFavorite
      tags: [residents]
      summary: Toggle a resident's favorited status
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteToggle"
      responses:
        "200":
          description: Updated resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"

  /bowel-movements:
    get:
      operationId: listBowelMovements
      tags: [bowelMovements]
      summary: List bowel movement events
      parameters:
        - name: residentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of bowel movement events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BowelMovement"
    post:
      operationId: createBowelMovement
      tags: [bowelMovements]
      summary: Record a bowel movement event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BowelMovementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BowelMovement"

  /pain-events:
    post:
      operationId: createPainEvent
      tags: [painEvents]
      summary: Record a pain event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PainEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PainEvent"

  /behavior-events:
    post:
      operationId: createBehaviorEvent
      tags: [behaviorEvents]
      summary: Record a behavior event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BehaviorEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehaviorEvent"

  /intake-events:
    post:
      operationId: createIntakeEvent
      tags: [intakeEvents]
      summary: Record a meal/fluid intake event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntakeEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntakeEvent"

  /fall-events:
    post:
      operationId: createFallEvent
      tags: [fallEvents]
      summary: Record a fall event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FallEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FallEvent"

  /vital-events:
    post:
      operationId: createVitalEvent
      tags: [vitalEvents]
      summary: Record a vitals event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VitalEventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VitalEvent"

  /communication-binder:
    get:
      operationId: listBinderEntries
      tags: [communicationBinder]
      summary: List communication binder entries
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, Resolved]
      responses:
        "200":
          description: List of binder entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BinderEntry"
    post:
      operationId: createBinderEntry
      tags: [communicationBinder]
      summary: Post a message to the communication binder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BinderEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinderEntry"

  /communication-binder/{messageId}/resolve:
    patch:
      operationId: resolveBinderEntry
      tags: [communicationBinder]
      summary: Mark a binder entry as resolved
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinderEntry"

  /communication-binder/{messageId}/undo:
    patch:
      operationId: undoBinderEntry
      tags: [communicationBinder]
      summary: Undo resolve — move entry back to Active
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinderEntry"

  /physician/summary:
    get:
      operationId: getPhysicianSummary
      tags: [physician]
      summary: Get physician population health summary
      responses:
        "200":
          description: Physician summary with per-resident alert status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhysicianSummary"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Resident:
      type: object
      required: [id, name, room, isFavorited]
      properties:
        id:
          type: integer
        name:
          type: string
        room:
          type: string
        isFavorited:
          type: boolean
        dob:
          type: ["string", "null"]
          format: date
        phn:
          type: ["string", "null"]

    FavoriteToggle:
      type: object
      required: [isFavorited]
      properties:
        isFavorited:
          type: boolean

    BowelMovement:
      type: object
      required: [id, residentId, bristolType, amount, incontinence, bloodPresent, mucusPresent, painStraining, prnGiven, clinicalNote, createdAt]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        staffId:
          type: ["string", "null"]
        bristolType:
          type: integer
        amount:
          type: string
        incontinence:
          type: boolean
        bloodPresent:
          type: boolean
        mucusPresent:
          type: boolean
        painStraining:
          type: boolean
        prnGiven:
          type: boolean
        clinicalNote:
          type: string
        createdAt:
          type: string
          format: date-time

    BowelMovementInput:
      type: object
      required: [residentId, bristolType, amount, incontinence, bloodPresent, mucusPresent, painStraining, clinicalNote]
      properties:
        residentId:
          type: integer
        staffId:
          type: string
        bristolType:
          type: integer
          minimum: 1
          maximum: 7
        amount:
          type: string
          enum: [Small, Medium, Large, XL]
        incontinence:
          type: boolean
        bloodPresent:
          type: boolean
        mucusPresent:
          type: boolean
        painStraining:
          type: boolean
        prnGiven:
          type: boolean
        clinicalNote:
          type: string
        recordedAt:
          type: string
          format: date-time

    PainEventInput:
      type: object
      required: [residentId, severity, location, clinicalNote]
      properties:
        residentId:
          type: integer
        staffId:
          type: string
        severity:
          type: string
          enum: [None, Mild, Moderate, Severe]
        location:
          type: string
          enum: [Back, Legs, Chest, Head, Abdomen, Other]
        prnGiven:
          type: boolean
        clinicalNote:
          type: string
        recordedAt:
          type: string
          format: date-time

    PainEvent:
      type: object
      required: [id, residentId, severity, location, prnGiven, clinicalNote, createdAt]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        staffId:
          type: ["string", "null"]
        severity:
          type: string
        location:
          type: string
        prnGiven:
          type: boolean
        clinicalNote:
          type: string
        createdAt:
          type: string
          format: date-time

    BehaviorEventInput:
      type: object
      required: [residentId, type, intensity, clinicalNote]
      properties:
        residentId:
          type: integer
        staffId:
          type: string
        type:
          type: string
          enum: [Agitation, Physical, Verbal, Wandering, Refusing Care]
        intensity:
          type: string
          enum: [Low, High]
        durationMins:
          type: integer
        clinicalNote:
          type: string
        recordedAt:
          type: string
          format: date-time

    BehaviorEvent:
      type: object
      required: [id, residentId, type, intensity, clinicalNote, createdAt]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        staffId:
          type: ["string", "null"]
        type:
          type: string
        intensity:
          type: string
        durationMins:
          type: ["integer", "null"]
        clinicalNote:
          type: string
        createdAt:
          type: string
          format: date-time

    IntakeEventInput:
      type: object
      required: [residentId, mealPercent, fluidMl, clinicalNote]
      properties:
        residentId:
          type: integer
        staffId:
          type: string
        mealType:
          type: string
          enum: [Breakfast, Lunch, Dinner, Snack]
        mealPercent:
          type: integer
          enum: [0, 25, 50, 75, 100]
        fluidMl:
          type: integer
        supplementsGiven:
          type: boolean
        clinicalNote:
          type: string
        recordedAt:
          type: string
          format: date-time

    IntakeEvent:
      type: object
      required: [id, residentId, mealPercent, fluidMl, supplementsGiven, clinicalNote, createdAt]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        staffId:
          type: ["string", "null"]
        mealType:
          type: ["string", "null"]
        mealPercent:
          type: integer
        fluidMl:
          type: integer
        supplementsGiven:
          type: boolean
        clinicalNote:
          type: string
        createdAt:
          type: string
          format: date-time

    FallEventInput:
      type: object
      required: [residentId, isWitnessed, apparentInjury, neuroVitalsStarted, clinicalNote]
      properties:
        residentId:
          type: integer
        staffId:
          type: string
        isWitnessed:
          type: boolean
        apparentInjury:
          type: boolean
        neuroVitalsStarted:
          type: boolean
        clinicalNote:
          type: string
        recordedAt:
          type: string
          format: date-time

    FallEvent:
      type: object
      required: [id, residentId, isWitnessed, apparentInjury, neuroVitalsStarted, clinicalNote, createdAt]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        staffId:
          type: ["string", "null"]
        isWitnessed:
          type: boolean
        apparentInjury:
          type: boolean
        neuroVitalsStarted:
          type: boolean
        clinicalNote:
          type: string
        createdAt:
          type: string
          format: date-time

    VitalEventInput:
      type: object
      required: [residentId, isAbnormalFlag, clinicalNote]
      properties:
        residentId:
          type: integer
        staffId:
          type: string
        temp:
          type: number
        bpSys:
          type: integer
        bpDia:
          type: integer
        hr:
          type: integer
        o2:
          type: number
        weight:
          type: number
        isAbnormalFlag:
          type: boolean
        clinicalNote:
          type: string

    VitalEvent:
      type: object
      required: [id, residentId, isAbnormalFlag, clinicalNote, createdAt]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        staffId:
          type: ["string", "null"]
        temp:
          type: ["number", "null"]
        bpSys:
          type: ["integer", "null"]
        bpDia:
          type: ["integer", "null"]
        hr:
          type: ["integer", "null"]
        o2:
          type: ["number", "null"]
        weight:
          type: ["number", "null"]
        isAbnormalFlag:
          type: boolean
        clinicalNote:
          type: string
        createdAt:
          type: string
          format: date-time

    ResidentAlertSummary:
      type: object
      required: [residentId, name, room, alertLevel, lastBMAt, hoursSinceLastBM, monthlyGapCount, monthlyBloodCount, hasSeverePain, behaviorEventCount24h, hasFall24h, hasAbnormalVital24h]
      properties:
        residentId:
          type: integer
        name:
          type: string
        room:
          type: string
        alertLevel:
          type: string
          enum: [none, amber, red]
        lastBMAt:
          type: ["string", "null"]
          format: date-time
        hoursSinceLastBM:
          type: ["number", "null"]
        monthlyGapCount:
          type: integer
        monthlyBloodCount:
          type: integer
        hasSeverePain:
          type: boolean
        behaviorEventCount24h:
          type: integer
        hasFall24h:
          type: boolean
        hasAbnormalVital24h:
          type: boolean

    FaxDirectoryEntry:
      type: object
      required: [id, labelName, faxNumber]
      properties:
        id:
          type: integer
        labelName:
          type: string
        faxNumber:
          type: string

    FaxDirectoryInput:
      type: object
      required: [labelName, faxNumber]
      properties:
        labelName:
          type: string
        faxNumber:
          type: string

    FaxInput:
      type: object
      required: [residentId, destinationLabel, faxNumber, noteContent]
      properties:
        residentId:
          type: integer
        destinationLabel:
          type: string
        faxNumber:
          type: string
        noteContent:
          type: string

    FaxLog:
      type: object
      required: [id, residentId, residentName, residentRoom, destinationLabel, faxNumber, noteContent, timestamp, status]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        residentName:
          type: string
        residentRoom:
          type: string
        destinationLabel:
          type: string
        faxNumber:
          type: string
        noteContent:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string

    BinderEntryInput:
      type: object
      required: [residentId, messageText]
      properties:
        residentId:
          type: integer
        messageText:
          type: string

    BinderEntry:
      type: object
      required: [id, residentId, residentName, residentRoom, messageText, status, timestamp]
      properties:
        id:
          type: integer
        residentId:
          type: integer
        residentName:
          type: string
        residentRoom:
          type: string
        messageText:
          type: string
        status:
          type: string
        timestamp:
          type: string
          format: date-time
        resolvedTimestamp:
          type: ["string", "null"]
          format: date-time

    PhysicianSummary:
      type: object
      required: [residents, facilityMonthlyGaps, facilityMonthlyBlood, generatedAt]
      properties:
        residents:
          type: array
          items:
            $ref: "#/components/schemas/ResidentAlertSummary"
        facilityMonthlyGaps:
          type: integer
        facilityMonthlyBlood:
          type: integer
        generatedAt:
          type: string
          format: date-time
